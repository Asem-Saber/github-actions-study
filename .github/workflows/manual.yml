on: # This allows us to run the workflow manually using github gui or github cli
   workflow_dispatch: 
     inputs:
        environment: 
          description: "Choose environment"
          required: true
          default: "staging"
          type: choice
          options:
             - staging
             - production 

jobs:
   deploy:
      runs-on: ubuntu-latest
      steps:
         - name: Deploy application
           run: echo "Deploying the application to ${{ inputs.environment }}."